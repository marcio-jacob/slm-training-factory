# Stage 1: Portuguese Foundation
# Goal: Fine-tune Qwen 2.5 3B to be fluent in Brazilian Portuguese
# Input:  Qwen/Qwen2.5-3B (base, strong multilingual)
# Output: ./checkpoints/qwen-portuguese-best  (LoRA adapter)
#
# Why Qwen2.5-3B on a 6 GB GPU:
#   - 3B params × 0.5 bytes (4-bit NF4) ≈ 1.5 GB weights → fits easily in 6 GB VRAM
#   - Qwen2.5-7B in 4-bit needs ~5.5 GB which exceeds the 5.67 GB usable on RTX 3050 6 GB
#   - Qwen2.5 family trained on 18T tokens; strong multilingual including Portuguese
#   - Same LoRA target_modules as 7B → no config changes if you later upgrade
#
# Upgrade path: switch name to Qwen/Qwen2.5-7B once you have a 8+ GB GPU
#
# Usage:
#   python factory.py --config config/portuguese.yaml
#   python factory.py --config config/portuguese.yaml --dry-run

model:
  name: Qwen/Qwen2.5-3B
  load_in_4bit: true
  bnb_4bit_compute_dtype: bfloat16
  bnb_4bit_quant_type: nf4
  bnb_4bit_use_double_quant: true

lora:
  r: 16
  alpha: 32
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj
  dropout: 0.05
  bias: none
  task_type: CAUSAL_LM

training:
  batch_size: 1
  gradient_accumulation_steps: 16    # keeps effective batch = 16 (same as before)
  max_seq_len: 512
  learning_rate: 2.0e-4
  lr_scheduler: cosine
  warmup_ratio: 0.03
  weight_decay: 0.01
  gradient_checkpointing: true
  bf16: true
  fp16: false
  budget_seconds: 36000           # 10 hours for full autoresearch run
  save_steps: 200
  logging_steps: 10
  output_dir: ./checkpoints/qwen-portuguese

dataset:
  name: wikipedia-pt              # Start with Wikipedia PT (high quality, ~1GB)
  split: train
  val_split: 0.005
  max_samples: 50000              # ~50k articles keeps tokenization fast (~30s)
  text_column: text
  preprocessing_num_workers: 4

metric:
  name: perplexity                # Lower perplexity on PT text = better Portuguese
  lower_is_better: true
