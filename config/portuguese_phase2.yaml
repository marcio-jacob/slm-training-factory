# Phase 2: Full Portuguese training with best hyperparameters from autoresearch
#
# Best config found by 1-hour autoresearch (2026-03-16):
#   r=64, alpha=128, lr=2e-4, seq=512 → perplexity 7.3514
#
# This run uses the full Wikipedia PT dataset (~1.1M articles) and a 4-hour
# budget. At ~23s/step with effective batch=16, that's ~627 training steps —
# roughly 10K articles worth of gradient updates (a solid warm-up run).
#
# After this completes, merge the adapter:
#   python factory.py merge --config config/portuguese_phase2.yaml
#
# Output: ./models/qwen-portuguese-v1  (standalone merged model)

model:
  name: Qwen/Qwen2.5-3B
  load_in_4bit: true
  bnb_4bit_compute_dtype: bfloat16
  bnb_4bit_quant_type: nf4
  bnb_4bit_use_double_quant: true

lora:
  r: 64
  alpha: 128
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj
  dropout: 0.05
  bias: none
  task_type: CAUSAL_LM

training:
  batch_size: 1
  gradient_accumulation_steps: 16
  max_seq_len: 512
  learning_rate: 2.0e-4
  lr_scheduler: cosine
  warmup_ratio: 0.03
  weight_decay: 0.01
  gradient_checkpointing: true
  bf16: true
  fp16: false
  budget_seconds: 14400          # 4 hours
  save_steps: 100
  logging_steps: 10
  output_dir: ./checkpoints/qwen-portuguese-phase2

dataset:
  name: wikipedia-pt
  split: train
  val_split: 0.005
  max_samples: null               # full dataset (~1.1M articles)
  text_column: text
  preprocessing_num_workers: 4

metric:
  name: perplexity
  lower_is_better: true

versioning:
  store_dir: ./models/qwen-portuguese-versions
